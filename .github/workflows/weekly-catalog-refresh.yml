name: Weekly Catalog Refresh

# 每週一 04:00 UTC（12:00 台北）刷新 GitHub star 數 + 檢查連結失效。
# - 如果 star 數有變化、自動開 PR 供 review。
# - 如果有 broken link、開 issue 讓 maintainer 處理（不自動修，broken link 通常需要人為決定要刪還是換）。
#
# 跟其他 cron 錯開：
# - lint.yml         03:00 daily
# - anchor-validator 04:00（per-PR、不是 schedule）
# - freshness-2026   05:00 monthly (1st)
# - weekly-refresh   04:00 weekly (Mon)  ← 本檔
#
# 手動觸發：Actions → Weekly Catalog Refresh → Run workflow
#
# 環境需求：
# - GITHUB_TOKEN（auto-provided）給 gh CLI 用、給 create-pull-request 用
# - 不需要其他 secret

on:
  schedule:
    # 每週一 04:00 UTC
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      threshold:
        description: 'Star drift threshold (%) — only PR if any entry drifted more than this'
        required: false
        default: '10'

permissions:
  contents: write       # 給 create-pull-request 寫 branch 用
  pull-requests: write  # 給 create-pull-request 開 PR 用
  issues: write         # broken link → open issue

jobs:
  star-refresh:
    name: Refresh GitHub star counts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Refresh star counts (apply mode)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # --apply 會把 drift 的 entry 直接寫回 .md 檔
          # exit 0 = applied changes; exit 2 = nothing to apply (no drift)
          python scripts/refresh-stars.py \
            --threshold "${{ github.event.inputs.threshold || '10' }}" \
            --apply 2>&1 | tee star-refresh.log
          # `git diff --quiet` returns 0 = no changes, 1 = changes
          if git diff --quiet; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "No star drift detected this week."
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "Star drift detected — PR will be opened."
            git diff --stat
          fi
        id: refresh

      - name: Create PR if drift detected
        if: steps.refresh.outputs.drift == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/weekly-star-refresh
          delete-branch: true
          commit-message: |
            chore(catalog): weekly auto-refresh of GitHub star counts

            Generated by .github/workflows/weekly-catalog-refresh.yml
          title: "chore(catalog): weekly auto-refresh of GitHub star counts"
          body: |
            ## Weekly star count refresh

            This PR is auto-generated by `weekly-catalog-refresh.yml`. It runs
            `scripts/refresh-stars.py --apply` to update `★ Xk+` annotations
            across the catalog to match current GitHub star counts.

            ### Review checklist

            - [ ] Spot-check 3-5 random entries — do the new counts look right (gh api format)?
            - [ ] Confirm no project was unintentionally renamed / moved / deleted upstream
            - [ ] Confirm no diff in non-`★` content (this PR should only touch star annotations)

            ### Diff preview

            See `Files changed` tab. The change should be small (a few digit / scale changes).

            ### If you want to skip this week

            Just close the PR — next Monday a fresh PR will open with current numbers.

            🤖 Generated weekly by GitHub Actions
          labels: |
            automation
            catalog-refresh

  link-check:
    name: Scan for broken links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Scan links (fast mode — GitHub repos only, weekly cadence)
        run: |
          python scripts/check-links.py --fast --quiet > link-report.txt 2>&1 || true
          echo "--- broken links ---"
          cat link-report.txt | head -50
          # check-links.py exits with non-zero if broken links found
          # we tolerate that and capture output for issue opening below
          if grep -qE "FAIL|404|timeout|error" link-report.txt; then
            echo "broken=true" >> "$GITHUB_OUTPUT"
          else
            echo "broken=false" >> "$GITHUB_OUTPUT"
          fi
        id: linkcheck

      - name: Open issue if broken links found
        if: steps.linkcheck.outputs.broken == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Avoid issue spam — check if a recent broken-link issue is still open
          existing=$(gh issue list --label "broken-links" --state open --json number --jq 'length')
          if [ "$existing" -gt 0 ]; then
            echo "An open broken-links issue already exists. Skipping new issue creation."
            exit 0
          fi
          gh issue create \
            --title "weekly link check: broken links detected ($(date -u +%Y-%m-%d))" \
            --label "broken-links,automation" \
            --body "$(printf '## Broken link report\n\n`check-links.py --fast` flagged the following URLs. Verify, then either fix the link, replace with a working alternative, or remove if the resource is genuinely gone.\n\n```\n%s\n```\n\n🤖 Generated weekly by GitHub Actions. To suppress next week, fix the listed links — next Monday the scan reruns.' "$(cat link-report.txt | head -100)")"
